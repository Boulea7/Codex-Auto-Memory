name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Full Verify (Ubuntu, Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Keep v4 until pnpm/action-setup v6 stops breaking packageManager-pinned pnpm 10 lockfiles.
        # Evidence: Boulea7/Codex-Auto-Memory run 24561707575, pnpm/action-setup#225/#226/#227/#228, pnpm/pnpm#11264.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full verification
        run: pnpm verify:ci

  linux-smoke:
    name: Linux Smoke (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Keep v4 until pnpm/action-setup v6 stops breaking packageManager-pinned pnpm 10 lockfiles.
        # Evidence: Boulea7/Codex-Auto-Memory run 24561707575, pnpm/action-setup#225/#226/#227/#228, pnpm/pnpm#11264.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Dist CLI Smoke
        run: pnpm test:dist-cli-smoke:only

      - name: Docs Contract
        run: pnpm test:docs-contract

  platform-smoke:
    name: Platform Smoke (${{ matrix.os }}, Node 22)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Keep v4 until pnpm/action-setup v6 stops breaking packageManager-pinned pnpm 10 lockfiles.
        # Evidence: Boulea7/Codex-Auto-Memory run 24561707575, pnpm/action-setup#225/#226/#227/#228, pnpm/pnpm#11264.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Dist CLI Smoke
        run: pnpm test:dist-cli-smoke:only

  install-smoke:
    name: Install Smoke (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 24
          - os: windows-latest
            node: 22
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Keep v4 until pnpm/action-setup v6 stops breaking packageManager-pinned pnpm 10 lockfiles.
        # Evidence: Boulea7/Codex-Auto-Memory run 24561707575, pnpm/action-setup#225/#226/#227/#228, pnpm/pnpm#11264.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tarball Install Smoke
        run: pnpm test:tarball-install-smoke
