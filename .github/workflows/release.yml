name: Release

on:
  push:
    tags:
      - "v*"

env:
  # Keep v4 pinned for lockfile compatibility, but force JavaScript actions onto
  # the Node 24 runtime so GitHub's Node 20 action deprecation does not block releases.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release (Ubuntu, Node 20)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
    timeout-minutes: 60
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Keep v4 until pnpm/action-setup v6 stops breaking packageManager-pinned pnpm 10 lockfiles.
        # Evidence: Boulea7/Codex-Auto-Memory run 24561707575, pnpm/action-setup#225/#226/#227/#228, pnpm/pnpm#11264.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Verify upstream CI succeeded for this release commit
        env:
          GH_TOKEN: ${{ github.token }}
          RUNS_JSON_PATH: /tmp/release-ci-runs.json
        run: |
          gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow CI \
            --commit "${GITHUB_SHA}" \
            --json databaseId,event,headSha,status,conclusion,url \
            --limit 10 > "${RUNS_JSON_PATH}"
          node -e '
            const fs = require("node:fs");
            const runs = JSON.parse(fs.readFileSync(process.env.RUNS_JSON_PATH, "utf8"));
            const successfulRun = runs.find(
              (run) =>
                run.event === "push" &&
                run.headSha === process.env.GITHUB_SHA &&
                run.status === "completed" &&
                run.conclusion === "success"
            );
            if (!successfulRun) {
              console.error(`No successful push CI run found for ${process.env.GITHUB_SHA}.`);
              console.error(JSON.stringify(runs, null, 2));
              process.exit(1);
            }
            console.log(`Using CI run ${successfulRun.databaseId}: ${successfulRun.url}`);
          '

      - name: Verify release candidate
        run: pnpm verify:release

      - name: Pack release tarball
        id: pack
        run: |
          pnpm pack:release >/dev/null
          TARBALL=$(node -e "const fs = require('node:fs'); const path = require('node:path'); const dir = '.release-artifacts'; const files = fs.readdirSync(dir).filter((file) => file.endsWith('.tgz')); if (files.length !== 1) { console.error(`Expected exactly one tarball in ${dir}, found ${files.length}.`); process.exit(1); } process.stdout.write(files[0]);")
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "tarball_path=.release-artifacts/${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Preflight npm release
        id: npm_preflight
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ -z "$NODE_AUTH_TOKEN" ]; then
            {
              echo "## npm publish is not configured"
              echo
              echo "Set the repository \`NPM_TOKEN\` secret before tagging when you want the automated release path."
              echo "If you need to proceed manually, publish \`${{ steps.pack.outputs.tarball_path }}\` from an authenticated maintainer machine first, then rerun the release workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          npm whoami

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/tmp/npm-version.txt 2>/tmp/npm-version.err; then
            echo "publish_mode=already-published" >> "$GITHUB_OUTPUT"
            {
              echo "## npm release status"
              echo
              echo "- \`${PACKAGE_NAME}@${PACKAGE_VERSION}\` is already published on npm."
              echo "- The workflow will skip \`npm publish\` and continue with the GitHub Release artifact."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if ! grep -qi "E404" /tmp/npm-version.err; then
            cat /tmp/npm-version.err >&2
            exit 1
          fi

          if npm view "${PACKAGE_NAME}" name --registry https://registry.npmjs.org >/tmp/npm-package.txt 2>/tmp/npm-package.err; then
            npm access list packages --json >/tmp/npm-access.json
            PACKAGE_NAME="${PACKAGE_NAME}" node -e '
              const fs = require("node:fs");
              const packageName = process.env.PACKAGE_NAME;
              const access = JSON.parse(fs.readFileSync("/tmp/npm-access.json", "utf8"));
              if (!(packageName in access)) {
                console.error(`Package ${packageName} already exists on npm and is not publishable with the current token.`);
                process.exit(1);
              }
            '
            echo "publish_mode=publish" >> "$GITHUB_OUTPUT"
            {
              echo "## npm release status"
              echo
              echo "- \`${PACKAGE_NAME}\` already exists on npm."
              echo "- The current token can publish the new version \`${PACKAGE_VERSION}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if grep -qi "E404" /tmp/npm-package.err; then
            echo "publish_mode=publish" >> "$GITHUB_OUTPUT"
            {
              echo "## npm release status"
              echo
              echo "- \`${PACKAGE_NAME}\` is not present on npm yet."
              echo "- The workflow will treat this as a first publish for version \`${PACKAGE_VERSION}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          cat /tmp/npm-package.err >&2
          exit 1

      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${{ steps.pack.outputs.tarball_path }}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${{ steps.pack.outputs.tarball_path }}" --generate-notes --verify-tag
          fi

      - name: Publish to npm
        if: ${{ steps.npm_preflight.outputs.publish_mode == 'publish' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public "${{ steps.pack.outputs.tarball_path }}"
